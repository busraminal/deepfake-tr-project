# Senkron / dudak–metin modeli – S_l (konuşma–dudak uyumsuzluk skoru)
# Girdi: mouth ROI dizisi + transcript/audio → Çıktı: uyumsuzluk skoru

model:
  mouth_encoder: temporal_cnn
  text_encoder: simple_bert_or_lstm
  embedding_dim: 256

train:
  batch_size: 16
  epochs: 40
  lr: 5.0e-4
  weight_decay: 1.0e-4

data:
  config: configs/data.yaml
  split: train
